services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Sqlserver!1234!"
    ports:
      - "1433:1433"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"

  ai:
    build: ./AI
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password123"
    depends_on:
      - qdrant
      - neo4j

  backend:
    build: ./RagApi
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=Rag;User Id=sa;Password=Sqlserver!1234!;TrustServerCertificate=True;"
      Ai__QdrantUrl: "http://qdrant:6333"
      Ai__PythonUrl: "http://ai:8000"
    depends_on:
      - sqlserver
      - qdrant
      - ai
    restart: on-failure

  frontend:
    build: ./ui/test
    ports:
      - "3000:80"
    depends_on:
      - backend